{% extends 'base.html' %}
{% block title %}
    AdoptaMex|Editar ciudad
{% endblock %}
{% block content %}
    <h1>Editar ciudad</h1>
    <form action="/editarCiudad/{{ ciudad.id_ciudad }}" method="post">
        <label for="nombre">Nombre de la ciudad:</label>
        <input type="text" id="nombre" name="nombre" value="{{ ciudad.nombre_ciudad }}" required><br><br>
        <input type="submit" value="Actualizar ciudad">
    </form>
    <a href="/ciudades">Cancelar</a>
{% endblock %}

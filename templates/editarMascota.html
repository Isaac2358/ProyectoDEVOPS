{% extends 'base.html' %}
{% block title %}
    AdoptaMex|Editar mascota
{% endblock %}
{% block content %}
    <h1>Editar mascota</h1>
    <form action="/editarMascota/{{ pet.id_mascota }}" method="post" enctype="multipart/form-data">
        <label for="nombreM">Nombre de la mascota:</label>
        <input type="text" id="nombreM" name="nombre" value="{{ pet.nombre }}" required><br><br>
        <label for="especieM">Especie:</label>
        <input type="text" id="especieM" name="especie" value="{{ pet.especie }}" required><br><br>
        <label for="razaM">Raza:</label>
        <input type="text" id="razaM" name="raza" value="{{ pet.raza }}" required><br><br>
        <label for="edadM">Edad:</label>
        <input type="number" id="edadM" name="edad" value="{{ pet.edad }}" step="0.1"><br><br>
        <label for="sexoM">Sexo:</label>
        <input type="text" id="sexoM" name="sexo" value="{{ pet.sexo }}" required><br><br>
        <label for="estadoM">Estado:</label>
        <input type="text" id="estadoM" name="estado" value="{{ pet.estado }}" required><br><br>
        <label for="fotoM">Foto:</label>
        <input type="file" accept="image/*" id="fotoM" name="foto" value="{{ pet.foto }}"><br><br>
        <label for="refugioM">Refugio:</label>
        <select name="refugio" id="refugioM" required>
            {% for refugio in refugios %}
                <option value="{{ refugio.id_refugio }}" {% if refugio.id_refugio == pet.id_refugio %} selected {% endif %}>{{refugio.nombre_refugio}}</option>
            {% endfor %}
        </select>
        <br><br>
        <input type="submit" value="Actualizar mascota">
    </form>
    <a href="/mascotas">Cancelar</a>
{% endblock %}

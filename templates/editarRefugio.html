{% extends 'base.html' %}
{% block title %}
    AdoptaMex|Editar refugio
{% endblock %}
{% block content %}
    <h1>Editar refugio</h1>
    <form action="/editarRefugio/{{ refugio.id_refugio }}" method="post">
        <label for="nombre">Nombre del refugio:</label>
        <input type="text" id="nombre" name="nombre" value="{{ refugio.nombre_refugio }}" required><br><br>
        
        <label for="ubicacion">Dirección:</label>
        <input type="text" id="ubicacion" name="ubicacion" value="{{ refugio.direccion }}" required><br><br>
        
        <label for="ciudad">Ciudad:</label>
        <select name="ciudad" id="ciudad" required>
            {% for ciudad in ciudades %}
                <option value="{{ ciudad.id_ciudad }}" {% if ciudad.id_ciudad == refugio.id_ciudad %}selected{% endif %}>
                    {{ ciudad.nombre_ciudad }}
                </option>
            {% endfor %}
        </select><br><br>
        
        <label for="admin">Administrador:</label>
        <select name="admin" id="admin" required>
            {% for usuario in usuarios %}
                {% if usuario.rol in ['admin_refugio', 'superadmin'] %}
                    <option value="{{ usuario.id_usuario }}" {% if usuario.id_usuario == refugio.id_admin %}selected{% endif %}>
                        {{ usuario.nombre }} ({{ usuario.rol }})
                    </option>
                {% endif %}
            {% endfor %}
        </select><br><br>
        
        <input type="submit" value="Actualizar refugio">
    </form>
    <a href="/refugios">Cancelar</a>
{% endblock %}

{% extends 'base.html' %}
{% block title %}
    AdoptaMex|Editar usuario
{% endblock %}
{% block content %}
    <h1>Editar usuario</h1>
    <form action="/editarUsuarios/{{ usuario.id_usuario }}" method="post">
        <label for="nombre">Nombre:</label>
        <input type="text" id="nombre" name="nombre" value="{{ usuario.nombre }}" required><br><br>
        
        <label for="email">Correo:</label>
        <input type="email" id="email" name="email" value="{{ usuario.correo }}" required><br><br>
        
        <label for="contrasena">Contraseña:</label>
        <input type="password" id="contrasena" name="contrasena" value="{{ usuario.contraseña }}" required><br><br>
        
        <label for="tel">Teléfono:</label>
        <input type="tel" id="tel" name="tel" value="{{ usuario.telefono }}"><br><br>
        
        <input type="submit" value="Actualizar usuario">
    </form>
    <a href="/usuarios">Cancelar</a>
{% endblock %}

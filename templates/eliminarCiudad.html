{% extends 'base.html' %}
{% block title %}
    AdoptaMex|Eliminar ciudad
{% endblock %}
{% block content %}
    <h1>Eliminar ciudad</h1>
    <form action="/eliminarCiudad/{{ ciudad.id_ciudad }}" method="post">
        <p>¿Estás seguro que deseas eliminar la siguiente ciudad?</p>
        <p>Nombre: {{ ciudad.nombre_ciudad }} - ID: {{ ciudad.id_ciudad }}</p>
        <input type="submit" value="Eliminar ciudad">
    </form>
    <a href="/ciudades">Cancelar</a>
{% endblock %}

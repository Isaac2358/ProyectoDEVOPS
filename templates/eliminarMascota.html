{% extends 'base.html' %}
{% block title %}
    AdoptaMex|Eliminar mascota
{% endblock %}
{% block content %}
    <h1>Eliminar mascota</h1>
    <form action="/eliminarMascota/{{ pet.id_mascota }}" method="post">
        <p>¿Estás seguro que deseas eliminar a la siguiente mascota?</p>
        <p>Nombre: {{ pet.nombre }} - ID: {{ pet.id_mascota }}</p>
        <input type="submit" value="Eliminar mascota">
    </form>
    <a href="/mascotas">Cancelar</a>
{% endblock %}

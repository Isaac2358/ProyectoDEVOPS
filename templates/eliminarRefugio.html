{% extends 'base.html' %}
{% block title %}
    AdoptaMex | Eliminar Refugio
{% endblock %}
{% block content %}
    <h1>Eliminar refugio</h1>
    <form action="/eliminarRefugio/{{ refugio.id_refugio }}" method="post">
        <p>¿Estás seguro que deseas eliminar el siguiente refugio?</p>
        <p>Nombre: {{ refugio.nombre_refugio }} - ID: {{ refugio.id_refugio }}</p>
        <input type="submit" value="Eliminar refugio">
    </form>
    <a href="/refugios">Cancelar</a>
{% endblock %}

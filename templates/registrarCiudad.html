{% extends 'base.html' %}
{% block title %}
    AdoptaMex|Registrar ciudad
{% endblock %}
{% block content %}
    <h1>Registrar una nueva ciudad</h1>
    <form action="/registrarCiudad" method="post">
        <label for="nombre">Nombre de la ciudad:</label>
        <input type="text" id="nombre" name="nombre" required><br><br>
        <input type="submit" value="Registrar ciudad">
    </form>
    <a href="/ciudades">Cancelar</a>
{% endblock %}
